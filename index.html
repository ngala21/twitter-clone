<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone | Home Page</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <div class="left-sidebar">
          <div class="logo-container">
            <svg
              class="logo"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 1200 1227"
              aria-label="X Logo"
              role="img"
            >
              <path
                fill="currentColor"
                d="M714.163 519.284L1160.89 0H1055.17L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.726L515.454 750.218L842.672 1226.37H1200L714.137 519.284H714.163ZM569.038 687.828L521.637 620.013L144.011 79.6944H306.615L611.406 515.79L658.807 583.605L1055.22 1150.69H892.615L569.038 687.854V687.828Z"
              />
            </svg>
          </div>
          <div class="navigation-menu">
            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M21 9.75L12 3 3 9.75V21h6v-6h6v6h6V9.75z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Home</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle
                  cx="11"
                  cy="11"
                  r="7"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <line
                  x1="16.65"
                  y1="16.65"
                  x2="21"
                  y2="21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <span>Explore</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M18 16V11a6 6 0 10-12 0v5L4 18h16l-2-2z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  d="M10 20a2 2 0 004 0"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <span>Notifications</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon">...</svg>

              <span>Messages</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon">...</svg>

              <span>Profile</span>
            </div>
          </div>
          <button class="logout-btn">Log Out</button>

          <div class="user-profile">
            <img src="./images/profile-image.jpg" class="user-avatar" alt="" />

            <div class="user-info">
              <h4>test one</h4>
              <p>@testone</p>
            </div>
          </div>
        </div>
        <div class="center-feed">
          <div class="create-post">
            <img
              class="user-avatar"
              src="./images/profile-image.jpg"
              alt="Profile Picture"
            />
            <div class="create-post-content">
              <input
                type="text"
                id="post-comment"
                placeholder="What's happening?"
                class="post-input"
              />
            </div>
            <div class="post-toolbar">
              <div class="post-tools">
                <button class="post-btn">Post</button>
              </div>
            </div>
          </div>

          <div class="feed-posts">
            <div class="tweet">
              <img
                src="./images/profile-image.jpg"
                class="tweet-avatar"
                alt=""
              />

              <div class="tweet-content">
                <div class="tweet-header">
                  <span class="tweet-name"> LEWIS RUHIU </span>

                  <span class="tweet-username"> @LEWIS RUHIU </span>
                </div>

                <div class="tweet-text">QaEfpt1caaRC1NkKBLkSb9cyqSh2</div>

                <div class="tweet-actions">
                  <div class="tweet-action">comment</div>

                  <div class="tweet-action">repost</div>

                  <div class="tweet-action">like</div>

                  <div class="tweet-action">share</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="right-panel"></div>
      </div>
    </div>
  </body>
</html>
