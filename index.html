<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone | Home Page</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <div class="left-sidebar">
          <div class="logo-container">
            <svg
              class="logo"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 1200 1227"
              aria-label="X Logo"
              role="img"
            >
              <path
                fill="currentColor"
                d="M714.163 519.284L1160.89 0H1055.17L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.726L515.454 750.218L842.672 1226.37H1200L714.137 519.284H714.163ZM569.038 687.828L521.637 620.013L144.011 79.6944H306.615L611.406 515.79L658.807 583.605L1055.22 1150.69H892.615L569.038 687.854V687.828Z"
              />
            </svg>
          </div>
          <div class="navigation-menu">

        <div class="nav-link">

          <svg class="nav-icon">
            ...
          </svg>

          <span>Home</span>

        </div>

        <div class="nav-link">

          <svg class="nav-icon">
            ...
          </svg>

          <span>Explore</span>

        </div>

        <div class="nav-link">

          <svg class="nav-icon">
            ...
          </svg>

          <span>Notifications</span>

        </div>

        <div class="nav-link">

          <svg class="nav-icon">
            ...
          </svg>

          <span>Messages</span>

        </div>

        <div class="nav-link">

          <svg class="nav-icon">
            ...
          </svg>

          <span>Profile</span>

        </div>

         <button class="logout-btn">
        Log Out
      </button>

       <div class="user-profile">

        <img
          src="./images/profile-image.jpg"
          class="user-avatar"
          alt=""
        />

        <div class="user-info">
          <h4>test one</h4>
          <p>@testone</p>
        </div>

        </div>
        <div class="center-feed">
          <div class="posts">
            <div class="post">
              <img
                class="profile-photo"
                src="./images/profile-image.jpg"
                alt="Profile Picture"
              />
              <div class="form">
                <input type="text" id="text" placeholder="What's happening?" />
              </div>
            </div>
          </div>
        </div>
        <div class="right-panel"></div>
      </div>
    </div>
  </body>
</html>
