<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone | Home Page</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <div class="left">
          <div class="logo-container">
            <svg
              class="logo"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 1200 1227"
              aria-label="X Logo"
              role="img"
            >
              <path
                fill="currentColor"
                d="M714.163 519.284L1160.89 0H1055.17L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.726L515.454 750.218L842.672 1226.37H1200L714.137 519.284H714.163ZM569.038 687.828L521.637 620.013L144.011 79.6944H306.615L611.406 515.79L658.807 583.605L1055.22 1150.69H892.615L569.038 687.854V687.828Z"
              />
            </svg>
          </div>
          <div class="navbar">
            <span>Home</span>
            <span>Search</span>
            <span>Notifications</span>
            <span>Messages</span>
            <span>Contact</span>
            <button class="submit" id="logout">Log Out</button>
          </div>
        </div>
        <div class="center">
          <div class="posts">
            <div class="post">
              <img src="" alt="Profile Picture" />
              <span>What's happening?</span>
            </div>
          </div>
        </div>
        <div class="right"></div>
      </div>
    </div>
  </body>
</html>
