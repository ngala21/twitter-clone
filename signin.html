<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone | Login</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="main">
      <div class="leftie">
        <div class="twitter">
          <div class="twitter-branding">
            <!-- logo -->
            <h2>log In</h2>
          </div>
          <div class="form">
            <input
              type="email"
              password="Enter your email address"
              id="email"
            />
            <input
              type="password"
              password="Enter your password"
              id="password"
            />
          </div>
          <button id="submit">Log In</button>
          <p>Don't have an account? <a href="./signup.html">Sign Up</a></p>
        </div>
      </div>
      <div class="rightie">
        <img src="./images/bgcover.jpg" alt="" />
      </div>
    </div>
  </body>
</html>
