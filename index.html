<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone | Home Page</title>
    <link
      rel="shortcut icon"
      href="./images/twitter-logo.jpg"
      sizes="32x32"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <div class="left-sidebar">
          <div class="logo-container">
            <svg
              class="logo"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 1200 1227"
              aria-label="X Logo"
              role="img"
            >
              <path
                fill="currentColor"
                d="M714.163 519.284L1160.89 0H1055.17L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.726L515.454 750.218L842.672 1226.37H1200L714.137 519.284H714.163ZM569.038 687.828L521.637 620.013L144.011 79.6944H306.615L611.406 515.79L658.807 583.605L1055.22 1150.69H892.615L569.038 687.854V687.828Z"
              />
            </svg>
          </div>
          <div class="navigation-menu">
            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M21 9.75L12 3 3 9.75V21h6v-6h6v6h6V9.75z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Home</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle
                  cx="11"
                  cy="11"
                  r="7"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <line
                  x1="16.65"
                  y1="16.65"
                  x2="21"
                  y2="21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <span>Explore</span>
            </div>

            <div class="nav-link">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M18 16V11a6 6 0 10-12 0v5L4 18h16l-2-2z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  d="M10 20a2 2 0 004 0"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <span>Notifications</span>
            </div>

            <div class="nav-link">
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <rect
                  x="3"
                  y="5"
                  width="18"
                  height="14"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="2"
                />

                <path
                  d="M4 7L12 13L20 7"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Messages</span>
            </div>

            <div class="nav-link">
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <!-- Head -->
                <circle
                  cx="12"
                  cy="8"
                  r="4"
                  stroke="currentColor"
                  stroke-width="2"
                />

                <!-- Shoulders -->
                <path
                  d="M4 20C4 16.8 7.6 15 12 15C16.4 15 20 16.8 20 20"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Profile</span>
            </div>
          </div>
          <button class="logout-btn" id="logout">Log Out</button>

          <div class="user-profile">
            <img src="./images/profile-image.jpg" class="user-avatar" alt="" />

            <div class="user-info">
              <h4>test one</h4>
              <p>@testone</p>
            </div>
          </div>
        </div>
        <div class="center-feed">
          <div class="create-post">
            <img
              class="user-avatar"
              src="./images/profile-image.jpg"
              alt="Profile Picture"
            />

            <div class="create-post-right">
              <input
                type="text"
                id="post-comment"
                placeholder="What's happening?"
                class="post-input"
              />

              <div class="post-toolbar">
                <div class="post-tools-left">
                  <svg
                    class="toolbar-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#1d9bf0"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="3" y="3" width="18" height="18" rx="4" />
                    <circle cx="16.5" cy="7.5" r="1.25" fill="#1d9bf0" />
                    <path d="M3 18l6-6 4 4 5-5 3 3" />
                  </svg>
                  <svg
                    class="toolbar-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#1d9bf0"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="3" y="3" width="18" height="18" rx="4" />
                    <path
                      d="M9.5 9h-1.5a1.5 1.5 0 0 0-1.5 1.5v3a1.5 1.5 0 0 0 1.5 1.5h1.5v-2.5h-1"
                    />
                    <line x1="12" y1="9" x2="12" y2="15" />
                    <path d="M17 9h-2.5v6M14.5 12h2" />
                  </svg>
                  <svg
                    class="toolbar-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#1d9bf0"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="6" y1="4" x2="6" y2="20" />
                    <line x1="6" y1="8" x2="16" y2="8" />
                    <line x1="6" y1="12" x2="20" y2="12" />
                    <line x1="6" y1="16" x2="13" y2="16" />
                  </svg>
                  <svg
                    class="toolbar-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#1d9bf0"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="9" />
                    <circle cx="9" cy="9.5" r="1.25" fill="#1d9bf0" />
                    <circle cx="15" cy="9.5" r="1.25" fill="#1d9bf0" />
                    <path d="M8 14.5a5 5 0 0 0 8 0" />
                  </svg>
                </div>

                <div class="post-tools-right">
                  <svg
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#3e4144"
                    stroke-width="2.5"
                  >
                    <circle cx="12" cy="12" r="9" />
                    <path
                      d="M 12 3 A 9 9 0 0 1 21 12"
                      stroke="#1d9bf0"
                      stroke-linecap="round"
                    />
                  </svg>
                  <svg
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="#1d9bf0"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="9" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                  </svg>
                  <button class="post-btn">Post</button>
                </div>
              </div>
            </div>
          </div>

          <div class="feed-posts">
            <div class="tweet">
              <img
                src="./images/profile-image.jpg"
                class="tweet-avatar"
                alt="Avatar"
              />

              <div class="tweet-content">
                <div class="tweet-header">
                  <span class="tweet-name">LEWIS RUHIU</span>
                  <span class="tweet-username">@LEWIS RUHIU</span>
                </div>

                <div class="tweet-text">QaEfpt1caaRC1NkKBLkSb9cyqSh2</div>

                <div class="tweet-actions">
                  <div class="tweet-action">
                    <svg viewBox="0 0 24 24">
                      <path
                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
                      ></path>
                    </svg>
                    <span>2</span>
                  </div>

                  <div class="tweet-action">
                    <svg viewBox="0 0 24 24">
                      <path d="M17 1l4 4-4 4"></path>
                      <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                      <path d="M7 23l-4-4 4-4"></path>
                      <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                    <span>200</span>
                  </div>

                  <div class="tweet-action">
                    <svg viewBox="0 0 24 24">
                      <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                      ></path>
                    </svg>
                    <span>2.4M</span>
                  </div>

                  <div class="tweet-action">
                    <svg viewBox="0 0 24 24">
                      <path
                        d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"
                      ></path>
                      <polyline points="16 6 12 2 8 6"></polyline>
                      <line x1="12" y1="2" x2="12" y2="15"></line>
                    </svg>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="right-panel"></div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-analytics.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-firestore.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
